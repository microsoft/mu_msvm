# =============================================================================
# CreateRelease.yml -- Package Build artifacts and publish a GitHub Release.
# =============================================================================
#
# Triggered when the Build workflow completes successfully on the main branch.
# All logic lives in Python under:
#   .github/workflows/CreateRelease/scripts/*.py
# Configuration (baseVersion, tagPrefix) lives in:
#   .github/workflows/CreateRelease/data/release.yml
#
# To bump the major/minor version, edit release.yml. Do not edit this file.
# =============================================================================

name: CreateRelease

on:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  release:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    concurrency:
      group: create-release
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }

      - run: pip install pyyaml

      # Pull artifacts from the upstream Build run (or the latest Build on main
      # if this was triggered via workflow_dispatch).
      - name: Resolve upstream run id
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          else
            id=$(gh run list --repo "${{ github.repository }}" \
                              --workflow Build \
                              --branch main \
                              --status success \
                              --limit 1 \
                              --json databaseId --jq '.[0].databaseId')
            echo "run_id=$id" >> "$GITHUB_OUTPUT"
          fi

      - name: Download Build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          run-id: ${{ steps.upstream.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Package artifacts
        run: >
          python .github/workflows/CreateRelease/scripts/package_artifacts.py
          --artifacts-dir artifacts --release-dir release

      - name: Compute release tag
        id: tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          python .github/workflows/CreateRelease/scripts/compute_version.py
          --repo ${{ github.repository }} >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --target "${{ github.event.workflow_run.head_sha || github.sha }}" \
            --generate-notes \
            release/*.tar.gz
