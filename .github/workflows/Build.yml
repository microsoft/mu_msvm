# =============================================================================
# Build.yml -- mu_msvm UEFI build pipeline.
# =============================================================================
#
# Thin orchestration. All logic lives in Python under:
#   .github/workflows/Build/scripts/*.py
# All variant data lives in:
#   .github/workflows/Build/data/matrix.yml
#
# To add or remove a build variant, edit matrix.yml. Do not edit this file.
#
# Local equivalent:
#   python .github/workflows/Build/scripts/invoke_ci_locally.py --all
# =============================================================================

name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: ['*']
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # Generate the build matrix from data/matrix.yml so matrix.yml is the
  # single source of truth (used both here and by invoke_ci_locally.py).
  # ---------------------------------------------------------------------------
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.setmatrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }
      - run: pip install pyyaml
      - id: setmatrix
        run: python .github/workflows/Build/scripts/generate_matrix.py >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Build one variant per matrix row.
  # ---------------------------------------------------------------------------
  build:
    needs: generate-matrix
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with: { python-version: '3.12' }

      - name: Enable long paths
        run: git config --system core.longpaths true

      - name: Install + verify VS components
        run: >
          python .github/workflows/Build/scripts/install_vs_components.py
          --arch ${{ matrix.arch }} --tools ${{ matrix.tools }}

      - name: Stuart setup / update
        run: >
          python .github/workflows/Build/scripts/invoke_setup.py
          --tools ${{ matrix.tools }}

      - name: Build
        run: >
          python .github/workflows/Build/scripts/invoke_build.py
          --arch ${{ matrix.arch }} --target ${{ matrix.target }} --tools ${{ matrix.tools }}

      - name: Stage artifacts
        if: always()
        run: >
          python .github/workflows/Build/scripts/stage_artifacts.py
          --arch ${{ matrix.arch }} --target ${{ matrix.target }} --tools ${{ matrix.tools }}
          --out-dir staged

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-${{ matrix.arch }}-${{ matrix.tools }}-artifacts
          path: staged/
